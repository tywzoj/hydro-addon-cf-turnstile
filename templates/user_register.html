{% extends "layout/immersive.html" %}
{% block content %}
<div class="row"><div class="columns">
  <div class="immersive--content immersive--center">
    <h1>{{ _('Sign Up') }}</h1>
    <form method="POST" captcha>
      <div class="row"><div class="columns">
        <label class="inverse material textbox">
          {{ _('Email') }}
          <input name="mail" type="text" autofocus>
        </label>
      </div></div>
      <div class="row"><div class="columns">
        <div class="text-center">
          {{ captcha|safe }}
          {% if UiContext.turnstileSiteKey %}
          <input id="submit" type="submit" value="{{ _('Turnstile Validating') }}" class="inverse expanded rounded primary button disabled" disabled>
          {% else %}
          <input id="submit" type="submit" value="{{ _('Send Verification Email') }}" class="inverse expanded rounded primary button">
          {% endif %}
        </div>
      </div></div>
      {% if UiContext.turnstileSiteKey %}
      <div class="row"><div class="columns">
        <div
          class="cf-turnstile"
          appearance="interaction-only"
          data-sitekey="{{ UiContext.turnstileSiteKey }}"
          data-size="flexible"
          data-action="register"
          data-callback="onRegisterTurnstileSuccess"
          data-error-callback="onRegisterTurnstileError"
          data-expired-callback="onRegisterTurnstileExpired"
        ></div>
        <script>
          function onRegisterTurnstileSuccess(token) {
            $("#submit").prop("disabled", false).removeClass("disabled")
              .val("{{ _('Send Verification Email') }}");
          }
          function onRegisterTurnstileError() {
            $("#submit").prop("disabled", true).addClass("disabled")
              .val("{{ _('Turnstile verification failed') }}");
          }
          function onRegisterTurnstileExpired() {
            $("#submit").prop("disabled", true).addClass("disabled")
              .val("{{ _('Turnstile verification failed') }}");
          }
        </script>
      </div></div>
      {% endif %}
    </form>
  </div>
</div></div>
{% endblock %}
